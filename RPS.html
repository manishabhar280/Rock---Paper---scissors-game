<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors Game</title>
    <link rel="stylesheet" href="RPS.css">
</head>
<body>

    <div class="game-container">
        <h1>🎮 Rock Paper Scissors</h1>
        <p class="subtitle">Choose your move and beat the computer!</p>

        <div class="round-box">
            Round: <span id="round">1</span>
        </div>

        <div class="choices">
            <div class="choice" id="rock">
                <img src="https://sihoonathan.github.io/rock-paper-scissors/assets/img/rock2.png" alt="Rock">
                <p>Rock</p>
            </div>

            <div class="choice" id="paper">
                <img src="https://sihoonathan.github.io/rock-paper-scissors/assets/img/paper2.png" alt="Paper">
                <p>Paper</p>
            </div>

            <div class="choice" id="scissors">
                <img src="https://e7.pngegg.com/pngimages/522/764/png-clipart-lizard-spock-rock-paper-scissors-vulcan-salute-others-purple-blue-thumbnail.png" alt="Scissors">
                <p>Scissors</p>
            </div>
        </div>

        <div class="score-board">
            <div class="score">
                <p id="user-score">0</p>
                <h3>You</h3>
            </div>

            <div class="score">
                <p id="comp-score">0</p>
                <h3>Computer</h3>
            </div>
        </div>

        <div class="msg-container">
            <p id="msg">Play your move</p>
        </div>

        <button id="reset-btn">Reset Game</button>

        <footer>
            Made by Manisha Bhardwaj ❤️
        </footer>
    </div>

    <script src="RPS.js"></script>
</body>
</html>
